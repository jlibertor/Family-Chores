name = "family-chores-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "family-chores"
database_id = "db94d0ac-60c4-4c90-a9cf-b39c40da6b02"
migrations_dir = "../database/migrations"

[triggers]
crons = ["0 * * * *"]

[vars]
SMS_ENABLED = "true"
SMS_TEST_MODE = "false"
SMS_TEST_NUMBER = "+13105035221"
ALERTING_FROM_PHONE_NUMBER = "+13105934267"

# Configure the real parent PIN as a Cloudflare secret:
# wrangler secret put PARENT_PIN
# Configure Twilio credentials as Cloudflare secrets:
# wrangler secret put TWILIO_ACCOUNT_SID
# wrangler secret put TWILIO_AUTH_TOKEN
#
# Production keeps SMS_TEST_MODE=false so messages use per-member phone
# numbers, fish text opt-ins, and text windows from Parent setup. For local
# SMS testing, temporarily set SMS_TEST_MODE=true in a local-only config.
